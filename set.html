<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Set details</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/set-modal.css">
    <link rel="stylesheet" href="css/set.css">
    <link rel="stylesheet" href="css/flashcards.css">
    <link rel="stylesheet" href="css/multiple-choice.css">
    <link rel="stylesheet" href="css/spelling.css">
    <link rel="stylesheet" href="css/learn-mode.css">
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/toast.js"></script>
    <script type="module" src="js/set-modal.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/supabase-init.js"></script>

</head>
<body>
    <quizy-header class="header"></quizy-header>

    <main class="set-wrapper">
        <div class="set-hero glass-panel">
            <div class="hero-bg-wrapper">
                <div class="hero-bg-glow"></div>
            </div>
            
            <div class="hero-top-bar">
                <a href="dashboard.html" class="btn-back">
                    <span class="material-symbols-rounded">arrow_back</span>
                    Dashboard
                </a>
                <div class="set-actions">
                    <button id="btn-share-set" class="btn-icon-action share-btn" title="Link kopiëren">
                        <span class="material-symbols-rounded">share</span>
                    </button>
                    <button id="btn-toggle-visibility" class="btn-icon-action visibility-btn" title="Zichtbaarheid wijzigen">
                        <span class="material-symbols-rounded" id="visibility-icon">lock</span>
                    </button>
                    <button id="btn-edit-set" class="btn-icon-action edit-btn" title="Bewerken">
                        <span class="material-symbols-rounded">edit</span>
                    </button>
                    <button id="btn-delete-set" class="btn-icon-action delete-btn" title="Verwijderen">
                        <span class="material-symbols-rounded">delete</span>
                    </button>
                </div>
            </div>

            <div class="set-main-info">
                <h1 id="set-title">Laden...</h1>
                <div class="set-badges">
                    <span id="set-type-badge" class="set-badge">...</span>
                    <span id="set-count-badge" class="set-badge">... kaarten</span>
                    <span id="set-folder-badge" class="set-badge" style="display:none;"></span>
                    <span id="set-visibility-badge" class="set-badge">...</span>
                </div>
                <p id="set-description" class="set-description">Bezig met laden van setbeschrijving...</p>
                <div class="set-meta">
                    <div class="meta-item">
                        <span class="material-symbols-rounded">person</span>
                        <span id="creator-name">Laden...</span>
                    </div>
                    <div class="meta-item">
                        <span class="material-symbols-rounded">calendar_today</span>
                        <span id="set-created">Laden...</span>
                    </div>
                    <div class="meta-item">
                        <span class="material-symbols-rounded">update</span>
                        <span id="set-updated">Laden...</span>
                    </div>
                </div>
            </div>

            <div class="learn-hero-action">
                <div class="learn-wrapper">
                    <button id="btn-learn" class="btn-primary-glow">
                        <span class="material-symbols-rounded">school</span>
                        Start met leren
                    </button>
                    <div id="learn-bubble-menu" class="learn-menu-glass">
                        <a id="btn-flashcards" href="#" class="learn-option">
                            <div class="learn-icon-box" style="color: var(--blue);"><span class="material-symbols-rounded">style</span></div>
                            <div class="learn-text">Flashcards</div>
                        </a>
                        <a id="btn-multiple-choice" href="#" class="learn-option">
                            <div class="learn-icon-box" style="color: var(--orange);"><span class="material-symbols-rounded">quiz</span></div>
                            <div class="learn-text">Meerkeuze</div>
                        </a>
                        <a id="btn-spelling" href="#" class="learn-option">
                            <div class="learn-icon-box" style="color: #10b981;"><span class="material-symbols-rounded">edit_document</span></div>
                            <div class="learn-text">Spelling</div>
                        </a>
                        <a id="btn-learn-mode" href="#" class="learn-option">
                            <div class="learn-icon-box" style="color: #a78bfa;"><span class="material-symbols-rounded">school</span></div>
                            <div class="learn-text">Leermodus</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="terms-section">
            <div class="terms-header">
                <h2>Kaarten (<span id="terms-count">0</span>)</h2>
                <div class="search-box glass-panel">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Zoek in deze set...">
                </div>
            </div>

            <div id="terms-list" class="terms-list-grid">
                <div style="text-align:center; padding: 40px; color: var(--text-muted); grid-column: 1 / -1;">Laden van kaarten...</div>
            </div>
        </div>
    </main>

    
    <quizy-set-modal id="set-modal-comp"></quizy-set-modal>

    
    <quizy-delete-modal id="delete-confirm-modal" class="modal-overlay"></quizy-delete-modal>

    
    <quizy-warning-modal id="visibility-warning-modal" class="modal-overlay"></quizy-warning-modal>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/set.js"></script>
    <script type="module" src="js/flashcards.js"></script>
    <script type="module" src="js/multiple-choice.js"></script>
    <script type="module" src="js/spelling.js"></script>
    <script type="module" src="js/learn-mode.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Profiel</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/login.css">
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/toast.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/supabase-init.js"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
     crossorigin="anonymous"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <main class="dashboard-wrapper">
        <div class="dashboard-header">
            <div class="profile-header-card">
                <div class="profile-avatar-container">
                    <img id="user-avatar" src="" alt="Profielfoto" style="display: none;">
                    <span id="user-avatar-placeholder" class="material-symbols-rounded">person</span>
                </div>
                <div class="profile-header-info">
                    <h2 id="user-name">Laden...</h2>
                    <p><span id="user-email" class="user-email-text">Laden...</span></p>
                </div>
            </div>
        </div>
        <div class="dashboard-content">
            <div class="profile-grid">
                <div class="profile-section">
                    <div class="profile-section-header">
                        <span class="material-symbols-rounded">person</span>
                        <h3>Weergavenaam aanpassen</h3>
                    </div>
                    <form id="changeNameForm" class="login-form" autocomplete="off">
                        <div class="name-input-row">
                            <div class="input-group">
                                <label for="display-name">Weergavenaam</label>
                                <div class="input-wrapper">
                                    <span class="material-symbols-rounded input-icon">person</span>
                                    <input type="text" id="display-name" placeholder="Je weergavenaam" autocomplete="off">
                                </div>
                            </div>
 
                            <button type="submit" class="btn-gradient submit-btn">
                                <span>Bijwerken</span>
                                <span class="material-symbols-rounded">save</span>
                            </button>
                        </div>
                    </form>
 
 
                </div>
 
                <div class="profile-section">
                    <div class="profile-section-header">
                        <span class="material-symbols-rounded">lock_reset</span>
                        <h3>Wachtwoord wijzigen</h3>
                    </div>
                    <form id="changePasswordForm" class="login-form" autocomplete="off">
                        <div class="input-group">
                            <label for="old-password">Oud wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock</span>
                                <input type="password" id="old-password" placeholder="••••••••" autocomplete="off">
                            </div>
                            <div style="margin-top: 4px;">
                                <a href="#" class="forgot-password" id="resetPasswordBtn">Wachtwoord vergeten? Stuur direct een herstellink</a>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="new-password">Nieuw wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock_open</span>
                                <input type="password" id="new-password" placeholder="••••••••" autocomplete="off">
                            </div>
                        </div>
 
                        <div class="input-group">
                            <label for="confirm-password">Bevestig nieuw wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock_open</span>
                                <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="off">
                            </div>
                        </div>
 
                        <button type="submit" class="btn-gradient submit-btn" style="width: auto; align-self: flex-start; margin-top: 8px;">
                            <span>Wachtwoord bijwerken</span>
                            <span class="material-symbols-rounded">save</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    
    <div id="profileResetModal" class="modal" style="display: none;">
        <div class="modal-content glass-panel">
            <span class="close-btn" id="closeProfileResetModal">&times;</span>
            <h3>Herstellink versturen</h3>
            <p>Bevestig dat je geen robot bent om de herstellink te versturen naar <strong id="resetEmailDisplay"></strong>.</p>
            <form id="profileResetForm" autocomplete="off">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAADnaOROhBcRf-NwH" style="margin: 16px 0;"></div>
                <button type="submit" class="btn-gradient submit-btn">
                    <span>Link versturen</span>
                    <span class="material-symbols-rounded">send</span>
                </button>
            </form>
        </div>
    </div>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/profile.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Profiel</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <main class="dashboard-wrapper">
        <div class="dashboard-header">
            <h2 id="user-name">Laden...</h2>
            <p><span id="user-email" class="user-email-text">Laden...</span></p>
        </div>
        <div class="dashboard-content">
            <div class="welcome-box">
                <span class="material-symbols-rounded welcome-icon">account_circle</span>
                <h3>Profielgegevens</h3>
                <p>Welkom op je profielpagina. Hier kun je je accountgegevens inzien.</p>
            </div>

            <div class="welcome-box">
                <span class="material-symbols-rounded welcome-icon">lock_reset</span>
                <h3>Wachtwoord wijzigen</h3>
                <div id="password-message" class="message" style="display: none;"></div>
                <form id="changePasswordForm" class="login-form">
                    <div class="input-group">
                        <label for="old-password">Oud wachtwoord (optioneel)</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded input-icon">lock</span>
                            <input type="password" id="old-password" placeholder="••••••••" autocomplete="current-password">
                        </div>
                        <div style="margin-top: 4px;">
                            <a href="#" class="forgot-password" id="resetPasswordBtn">Wachtwoord vergeten? Stuur direct een herstellink</a>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="new-password">Nieuw wachtwoord</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded input-icon">lock_open</span>
                            <input type="password" id="new-password" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm-password">Bevestig nieuw wachtwoord</label>
                        <div class="input-wrapper">
                            <span class="material-symbols-rounded input-icon">lock_open</span>
                            <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
                        </div>
                    </div>

                    <button type="submit" class="btn-gradient submit-btn" style="width: auto; align-self: flex-start; margin-top: 8px;">
                        <span>Wachtwoord bijwerken</span>
                        <span class="material-symbols-rounded">save</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/profile.js"></script>
</body>

</html>

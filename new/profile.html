<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Profiel</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <main class="dashboard-wrapper">
        <div class="dashboard-header">
            <div class="profile-header-card">
                <div class="profile-avatar-container">
                    <img id="user-avatar" src="" alt="Profielfoto" style="display: none;">
                    <span id="user-avatar-placeholder" class="material-symbols-rounded">person</span>
                </div>
                <div class="profile-header-info">
                    <h2 id="user-name">Laden...</h2>
                    <p><span id="user-email" class="user-email-text">Laden...</span></p>
                </div>
            </div>
        </div>
        <div class="dashboard-content">
            <div class="profile-grid">
                <div class="profile-section">
                    <div class="profile-section-header">
                        <span class="material-symbols-rounded">person</span>
                        <h3>Weergavenaam aanpassen</h3>
                    </div>
                    <div id="profile-message" class="message" style="display: none;"></div>
                    <form id="changeNameForm" class="login-form">
                        <div class="name-input-row">
                            <div class="input-group">
                                <label for="display-name">Weergavenaam</label>
                                <div class="input-wrapper">
                                    <span class="material-symbols-rounded input-icon">person</span>
                                    <input type="text" id="display-name" placeholder="Je weergavenaam" required autocomplete="name">
                                </div>
                            </div>

                            <button type="submit" class="btn-gradient submit-btn">
                                <span>Bijwerken</span>
                                <span class="material-symbols-rounded">save</span>
                            </button>
                        </div>
                    </form>

                    <div class="profile-section-header" style="margin-top: 32px;">
                        <span class="material-symbols-rounded">image</span>
                        <div>
                            <h3>Profielfoto aanpassen</h3>
                            <p class="profile-section-subtitle" style="margin: 2px 0 0 0; font-size: 0.85em; color: var(--text-muted);">Kies een link of upload een foto</p>
                        </div>
                    </div>
                    <div id="avatar-message" class="message" style="display: none;"></div>
                    <form id="changeAvatarForm" class="login-form">
                        <div class="avatar-link-row">
                            <div class="input-group">
                                <label for="avatar-url">Profielfoto URL</label>
                                <div class="input-wrapper">
                                    <span class="material-symbols-rounded input-icon">link</span>
                                    <input type="url" id="avatar-url" placeholder="https://voorbeeld.com/afbeelding.png">
                                </div>
                            </div>

                            <button type="submit" class="btn-gradient submit-btn">
                                <span>Opslaan</span>
                                <span class="material-symbols-rounded">save</span>
                            </button>
                        </div>

                        <div class="input-group" style="margin-top: -8px;">
                            <label>Of bestand uploaden</label>
                            <div class="file-upload-wrapper">
                                <input type="file" id="avatar-file" accept="image/*" class="file-upload-input">
                                <div class="file-upload-trigger">
                                    <span class="material-symbols-rounded">upload_file</span>
                                    <span id="file-upload-text" class="file-upload-text">Kies een afbeelding...</span>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="profile-section">
                    <div class="profile-section-header">
                        <span class="material-symbols-rounded">lock_reset</span>
                        <h3>Wachtwoord wijzigen</h3>
                    </div>
                    <div id="password-message" class="message" style="display: none;"></div>
                    <form id="changePasswordForm" class="login-form">
                        <div class="input-group">
                            <label for="old-password">Oud wachtwoord (optioneel)</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock</span>
                                <input type="password" id="old-password" placeholder="••••••••" autocomplete="current-password">
                            </div>
                            <div style="margin-top: 4px;">
                                <a href="#" class="forgot-password" id="resetPasswordBtn">Wachtwoord vergeten? Stuur direct een herstellink</a>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="new-password">Nieuw wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock_open</span>
                                <input type="password" id="new-password" placeholder="••••••••" required autocomplete="new-password">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="confirm-password">Bevestig nieuw wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock_open</span>
                                <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
                            </div>
                        </div>

                        <button type="submit" class="btn-gradient submit-btn" style="width: auto; align-self: flex-start; margin-top: 8px;">
                            <span>Wachtwoord bijwerken</span>
                            <span class="material-symbols-rounded">save</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/profile.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Profiel</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/components.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
     crossorigin="anonymous"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <!-- Links Side Ad (Desktop) -->
    <div class="side-ad-left">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
             crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8924607946192862"
             data-ad-slot="5862330293"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <!-- Rechts Side Ad (Desktop) -->
    <div class="side-ad-right">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
             crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8924607946192862"
             data-ad-slot="5862330293"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <main class="dashboard-wrapper">
        <div class="dashboard-header">
            <div class="profile-header-card">
                <div class="profile-avatar-container">
                    <img id="user-avatar" src="" alt="Profielfoto" style="display: none;">
                    <span id="user-avatar-placeholder" class="material-symbols-rounded">person</span>
                </div>
                <div class="profile-header-info">
                    <h2 id="user-name">Laden...</h2>
                    <p><span id="user-email" class="user-email-text">Laden...</span></p>
                </div>
            </div>
        </div>
        <div class="dashboard-content">
            <div class="profile-grid">
                <div class="profile-section">
                    <div class="profile-section-header">
                        <span class="material-symbols-rounded">person</span>
                        <h3>Weergavenaam aanpassen</h3>
                    </div>
                    <form id="changeNameForm" class="login-form">
                        <div class="name-input-row">
                            <div class="input-group">
                                <label for="display-name">Weergavenaam</label>
                                <div class="input-wrapper">
                                    <span class="material-symbols-rounded input-icon">person</span>
                                    <input type="text" id="display-name" placeholder="Je weergavenaam" required autocomplete="name" maxlength="20">
                                </div>
                            </div>

                            <button type="submit" class="btn-gradient submit-btn">
                                <span>Bijwerken</span>
                                <span class="material-symbols-rounded">save</span>
                            </button>
                        </div>
                    </form>


                </div>

                <div class="profile-section">
                    <div class="profile-section-header">
                        <span class="material-symbols-rounded">lock_reset</span>
                        <h3>Wachtwoord wijzigen</h3>
                    </div>
                    <form id="changePasswordForm" class="login-form">
                        <div class="input-group">
                            <label for="old-password">Oud wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock</span>
                                <input type="password" id="old-password" placeholder="••••••••" autocomplete="current-password">
                            </div>
                            <div style="margin-top: 4px;">
                                <a href="#" class="forgot-password" id="resetPasswordBtn">Wachtwoord vergeten? Stuur direct een herstellink</a>
                            </div>
                        </div>
                        
                        <div class="input-group">
                            <label for="new-password">Nieuw wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock_open</span>
                                <input type="password" id="new-password" placeholder="••••••••" required autocomplete="new-password">
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="confirm-password">Bevestig nieuw wachtwoord</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-rounded input-icon">lock_open</span>
                                <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
                            </div>
                        </div>

                        <button type="submit" class="btn-gradient submit-btn" style="width: auto; align-self: flex-start; margin-top: 8px;">
                            <span>Wachtwoord bijwerken</span>
                            <span class="material-symbols-rounded">save</span>
                        </button>
                    </form>
                </div>
            </div>

            <div style="margin: 32px auto 0; width: 100%;">
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
                     crossorigin="anonymous"></script>
                <!-- Display -->
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-8924607946192862"
                     data-ad-slot="5862330293"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>
                     (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
            </div>
        </div>
    </main>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/profile.js"></script>
</body>

</html>

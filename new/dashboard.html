<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Dashboard</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/set-modal.css">
    <script src="js/components.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/set-modal.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
     crossorigin="anonymous"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <!-- Links Side Ad (Desktop) -->
    <div class="side-ad-left">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
             crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8924607946192862"
             data-ad-slot="5862330293"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <!-- Rechts Side Ad (Desktop) -->
    <div class="side-ad-right">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
             crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-8924607946192862"
             data-ad-slot="5862330293"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <main class="dashboard-wrapper">
        <div class="dashboard-header">
            <div>
                <h2>Welkom bij Quizy</h2>
                <p>Ingelogd als: <span id="user-email" class="user-email-text">Laden...</span></p>
            </div>
            <button id="btn-create-set" class="btn-gradient">
                <span class="material-symbols-rounded">add</span>
                Nieuwe set
            </button>
        </div>
        
        <!-- Folder Filter Container -->
        <div id="folder-filter-container" class="folder-filter-container"></div>

        <div class="dashboard-content">
            
        </div>

        <div style="margin: 32px auto 0; width: 100%;">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
                 crossorigin="anonymous"></script>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-format="autorelaxed"
                 data-ad-client="ca-pub-8924607946192862"
                 data-ad-slot="8087529182"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </main>

    <!-- Create/Edit Set Modal Component -->
    <quizy-set-modal id="set-modal-comp"></quizy-set-modal>

    <!-- Delete Confirmation Modal -->
    <quizy-delete-modal id="delete-confirm-modal" class="modal-overlay"></quizy-delete-modal>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/dashboard.js"></script>
</body>

</html>

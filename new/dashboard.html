<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Dashboard</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/set-modal.css">
    <script src="js/components.js" defer></script>
    <script src="js/set-modal.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <main class="dashboard-wrapper">
        <div class="dashboard-header">
            <div>
                <h2>Welkom bij Quizy</h2>
                <p>Ingelogd als: <span id="user-email" class="user-email-text">Laden...</span></p>
            </div>
            <button id="btn-create-set" class="btn-gradient">
                <span class="material-symbols-rounded">add</span>
                Nieuwe set
            </button>
        </div>
        <div class="dashboard-content">
            
        </div>
    </main>

    <!-- Create/Edit Set Modal Component -->
    <quizy-set-modal id="set-modal-comp"></quizy-set-modal>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/dashboard.js"></script>
</body>

</html>

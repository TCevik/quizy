<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Set details</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/set-modal.css">
    <link rel="stylesheet" href="css/set.css">
    <link rel="stylesheet" href="css/flashcards.css">
    <script src="js/components.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/set-modal.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
     crossorigin="anonymous"></script>
</head>
<body>
    <quizy-header class="header"></quizy-header>

    <main class="set-wrapper">
        <!-- Back navigation -->
        <div class="back-nav" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="dashboard.html" class="btn-back">
                <span class="material-symbols-rounded">arrow_back</span>
                Terug naar dashboard
            </a>
            <div class="set-actions">
                <button id="btn-edit-set" class="btn-icon-action edit-btn" title="Bewerken">
                    <span class="material-symbols-rounded">edit</span>
                </button>
                <button id="btn-delete-set" class="btn-icon-action delete-btn" title="Verwijderen" style="margin-left: 8px;">
                    <span class="material-symbols-rounded">delete</span>
                </button>
            </div>
        </div>

        <!-- Set Header Detail Info -->
        <div class="set-detail-header glass-panel">
            <div class="set-info-top">
                <h1 id="set-title">Laden...</h1>
                <div class="set-badges">
                    <span id="set-type-badge" class="set-badge">...</span>
                    <span id="set-count-badge" class="set-badge">... kaarten</span>
                    <span id="set-folder-badge" class="set-badge" style="display:none;"></span>
                </div>
            </div>
            <p id="set-description" class="set-description">Bezig met laden van setbeschrijving...</p>
            
            <div class="set-info-footer">
                <div class="created-at">
                    <span class="material-symbols-rounded">calendar_today</span>
                    <span>Aangemaakt: <span id="set-created">Laden...</span></span>
                </div>
                <div class="last-updated">
                    <span class="material-symbols-rounded">update</span>
                    <span>Laatst gewijzigd: <span id="set-updated">Laden...</span></span>
                </div>
                <div class="learn-wrapper" style="position: relative; display: inline-block; margin-left: auto;">
                    <button id="btn-learn" style="background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-light); padding: 8px 20px; border-radius: 100px; font-weight: 600; font-size: 0.9em; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: all 0.2s ease;">
                        <span class="material-symbols-rounded" style="font-size: 18px;">school</span>
                        Start met leren
                    </button>
                    <div id="learn-bubble-menu" style="position: absolute; top: calc(100% + 8px); right: 0; transform: scale(0.8); transform-origin: top right; display: flex; flex-direction: column; gap: 8px; width: auto; max-height: 0px; overflow: hidden; opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; z-index: 10; padding: 0;">
                        <a id="btn-flashcards" href="#" class="btn-icon-action" style="width: auto; height: auto; padding: 10px 20px; border-radius: 100px; font-size: 0.9em; font-weight: 600; text-decoration: none; color: var(--text-light); display: inline-flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); white-space: nowrap; transition: all 0.2s ease;">
                            <span class="material-symbols-rounded" style="font-size: 18px; color: var(--blue);">style</span>
                            Flashcards
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Terms Search & List -->
        <div class="terms-section">
            <div class="terms-header">
                <h2>Kaarten in deze set (<span id="terms-count">0</span>)</h2>
                <div class="search-box glass-panel">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Zoek in deze set...">
                </div>
            </div>

            <div id="terms-list" class="terms-list">
                <!-- Cards will be dynamically inserted here -->
                <div style="text-align:center; padding: 40px; color: var(--text-muted);">Laden van kaarten...</div>
            </div>
        </div>
    </main>

    <!-- Create/Edit Set Modal Component -->
    <quizy-set-modal id="set-modal-comp"></quizy-set-modal>

    <!-- Delete Confirmation Modal -->
    <quizy-delete-modal id="delete-confirm-modal" class="modal-overlay"></quizy-delete-modal>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/set.js"></script>
    <script src="js/flashcards.js"></script>
</body>
</html>

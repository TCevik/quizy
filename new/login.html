<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Inloggen</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/components.js" defer></script>
</head>

<body>
    <quizy-header class="header" login-page></quizy-header>

    <main class="login-wrapper">
        <div class="login-container glass-panel">
            <div class="login-header">
                <h2>Welkom terug</h2>
                <p>Log in om verder te gaan met leren</p>
            </div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="email">E-mailadres</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">mail</span>
                        <input type="email" id="email" placeholder="naam@voorbeeld.nl" required autocomplete="email">
                    </div>
                </div>
                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Wachtwoord</label>
                        <a href="#" class="forgot-password">Wachtwoord vergeten?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-gradient submit-btn">
                    <span>Inloggen</span>
                    <span class="material-symbols-rounded">arrow_forward</span>
                </button>
            </form>
        </div>
    </main>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Inloggen</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <header id="header">
        <div id="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">Quizy</div>
        <div id="items">
            <button onclick="window.open('https://tctam.nl', '_blank')">TC_tam</button>
            <button id="login-btn" onclick="window.location.href='index.html'">Home</button>
        </div>
    </header>

    <main class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h2>Welkom terug</h2>
                <p>Log in om verder te gaan met leren</p>
            </div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="email">E-mailadres</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">mail</span>
                        <input type="email" id="email" placeholder="naam@voorbeeld.nl" required autocomplete="email">
                    </div>
                </div>
                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Wachtwoord</label>
                        <a href="#" class="forgot-password">Wachtwoord vergeten?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="submit-btn">
                    <span>Inloggen</span>
                    <span class="material-symbols-rounded">arrow_forward</span>
                </button>
            </form>
            <div class="login-divider">
                <span>of</span>
            </div>
            <button class="google-btn">
                <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                </svg>
                <span>Doorgaan met Google</span>
            </button>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <span class="footer-brand">Quizy</span>
                <span class="footer-credit">Gemaakt door Tamer Çevik</span>
            </div>
            <div class="footer-right">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSenU2OuAafpBvayn0mgszuJmPA7dDdeHLP5ou0xpljfj0yRcg/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">Report Bug</a>
                <a href="https://tctam.nl/privacy" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
                <a href="https://tctam.nl/terms" target="_blank" rel="noopener noreferrer">Terms of Service</a>
            </div>
        </div>
    </footer>

    <script type="module" src="js/login.js"></script>
</body>

</html>

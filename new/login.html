<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Inloggen</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>
</head>

<body>
    <quizy-header class="header" login-page></quizy-header>

    <main class="login-wrapper">
        <div class="login-container glass-panel">
            <div class="login-header">
                <h2 id="formTitle">Welkom terug</h2>
                <p id="formSubtitle">Log in om verder te gaan met leren</p>
            </div>
            <div id="error-message" class="error-message" style="display: none;"></div>
            <form class="login-form" id="loginForm">
                <div class="input-group" id="nameGroup" style="display: none;">
                    <label for="name">Weergavenaam</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">person</span>
                        <input type="text" id="name" placeholder="Je naam" autocomplete="name">
                    </div>
                </div>
                <div class="input-group">
                    <label for="email">E-mailadres</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">mail</span>
                        <input type="email" id="email" placeholder="naam@voorbeeld.nl" required autocomplete="email">
                    </div>
                </div>
                <div class="input-group">
                    <div class="label-row">
                        <label for="password">Wachtwoord</label>
                        <a href="#" class="forgot-password" id="forgotPasswordBtn">Wachtwoord vergeten?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required
                            autocomplete="current-password">
                    </div>
                </div>
                <div class="input-group" id="confirmPasswordGroup" style="display: none;">
                    <label for="confirm-password">Bevestig wachtwoord</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn-gradient submit-btn" id="submitBtn">
                    <span id="submitText">Inloggen</span>
                    <span class="material-symbols-rounded" id="submitIcon">arrow_forward</span>
                </button>
            </form>
            <div class="signup-prompt">
                <span id="togglePromptText">Nog geen account?</span> <a href="#" id="toggleAuthBtn">Registreer hier</a>
            </div>
        </div>
    </main>

    <!-- Modal for password reset -->
    <div id="resetModal" class="modal" style="display: none;">
        <div class="modal-content glass-panel">
            <span class="close-btn" id="closeResetModal">&times;</span>
            <h3>Wachtwoord resetten</h3>
            <p>Vul je e-mailadres in om een resetlink te ontvangen.</p>
            <div id="reset-message" class="message" style="display: none;"></div>
            <form id="resetForm">
                <div class="input-group">
                    <label for="reset-email">E-mailadres</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">mail</span>
                        <input type="email" id="reset-email" placeholder="naam@voorbeeld.nl" required autocomplete="email">
                    </div>
                </div>
                <button type="submit" class="btn-gradient submit-btn">
                    <span>Link versturen</span>
                    <span class="material-symbols-rounded">send</span>
                </button>
            </form>
        </div>
    </div>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/login.js"></script>
</body>

</html>

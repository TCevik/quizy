<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Wachtwoord Resetten</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="js/components.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/supabase-init.js"></script>
</head>

<body>
    <quizy-header class="header" login-page></quizy-header>

    <main class="login-wrapper">
        <div class="login-container glass-panel">
            <div class="login-header">
                <h2>Nieuw wachtwoord</h2>
                <p>Vul je nieuwe wachtwoord in om je account te herstellen</p>
            </div>
            <form class="login-form" id="resetPasswordForm">
                <div class="input-group">
                    <label for="new-password">Nieuw wachtwoord</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="new-password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Bevestig wachtwoord</label>
                    <div class="input-wrapper">
                        <span class="material-symbols-rounded input-icon">lock</span>
                        <input type="password" id="confirm-password" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn-gradient submit-btn">
                    <span>Wachtwoord opslaan</span>
                    <span class="material-symbols-rounded">check_circle</span>
                </button>
            </form>
        </div>
    </main>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/reset-password.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Dashboard</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/set-modal.css">
    <script type="module" src="js/components.js"></script>
    <script type="module" src="js/toast.js"></script>
    <script type="module" src="js/set-modal.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/supabase-init.js"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
     crossorigin="anonymous"></script>
</head>

<body>
    <quizy-header class="header"></quizy-header>

    <main class="dashboard-layout">
        
        <aside class="dashboard-sidebar">
            <div id="folder-filter-container" class="folder-filter-container"></div>
            <div class="quizy-ad-box">
                <div class="quizy-ad-label">Sponsor</div>
                <!-- Multiplex Advertisement Start  -->
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
                    crossorigin="anonymous"></script>
                <ins class="adsbygoogle" style="display:block" data-ad-format="autorelaxed" data-ad-client="ca-pub-8924607946192862"
                    data-ad-slot="8087529182"></ins>
                <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
                <!-- Advertisement End -->
            </div>
        </aside>

        
        <section class="dashboard-main">
            
            <div class="dashboard-header glass-panel">
                <div class="header-welcome-text">
                    <h2>Welkom bij Quizy</h2>
                    <p>Ingelogd als: <span id="user-email" class="user-email-text">Laden...</span></p>
                </div>
                <div class="header-sets-usage" id="header-sets-usage">
                    <span class="sets-usage-label">Sets</span>
                    <span class="sets-usage-value" id="sets-usage-value">Laden...</span>
                </div>
            </div>

            
            
            <div class="dashboard-toolbar">
                <div class="search-container">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Zoek sets op titel..." autocomplete="off">
                </div>
                <button id="btn-select-shared" class="btn-sync" title="Sets selecteren" style="display: none;">
                    <span class="material-symbols-rounded">select_all</span>
                </button>
                <button id="btn-delete-selected" class="btn-sync" title="Geselecteerde sets verwijderen" style="display: none; background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #ef4444;">
                    <span class="material-symbols-rounded">delete_sweep</span>
                </button>
                <button id="btn-sync-sets" class="btn-sync" title="Synchroniseer sets">
                    <span class="material-symbols-rounded">sync</span>
                </button>
                <button id="btn-create-set" class="btn-gradient">
                    <span class="material-symbols-rounded">add</span>
                    Nieuwe set
                </button>
            </div>

            
            <div class="dashboard-content">
                <div class="quizy-ad-box" style="margin-top: 0;">
                    <div class="quizy-ad-label">Aanbevolen</div>
                    <!-- Display Advertisement Start  -->
                    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
                        crossorigin="anonymous"></script>
                    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8924607946192862" data-ad-slot="5862330293"
                        data-ad-format="auto" data-full-width-responsive="true"></ins>
                    <script>
                        (adsbygoogle = window.adsbygoogle || []).push({});
                    </script>
                    <!-- Advertisement End -->
                </div>
            </div>

            <div class="quizy-ad-box">
                <div class="quizy-ad-label">Advertentie</div>
                <!-- In Feed Advertisement Start  -->
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8924607946192862"
                    crossorigin="anonymous"></script>
                <ins class="adsbygoogle" style="display:block" data-ad-format="fluid" data-ad-layout-key="-fb+5w+4e-db+86"
                    data-ad-client="ca-pub-8924607946192862" data-ad-slot="8058343678"></ins>
                <script>
                    (adsbygoogle = window.adsbygoogle || []).push({});
                </script>
                <!-- Advertisement End -->
            </div>
        </section>
    </main>

    
    <quizy-set-modal id="set-modal-comp"></quizy-set-modal>

    
    <quizy-delete-modal id="delete-confirm-modal" class="modal-overlay"></quizy-delete-modal>

    
    <quizy-rename-modal id="rename-folder-modal" class="modal-overlay"></quizy-rename-modal>

    <quizy-footer></quizy-footer>

    <script type="module" src="js/dashboard.js"></script>
</body>

</html>
